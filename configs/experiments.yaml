# Reproduces the paper's Table 8 (datasets), Table 9 (accuracy/precision/recall/F1),
# and Table 10 (coverage) parameter grid -- see Section 5.2.

datasets: [sonar, breast, banknote, image, phishing, letter]

baselines: [svm, decision_tree, knn, naive_bayes]

grs3wdc_n:
  metric: euclidean
  threshold_mode: percentile
  params:
    - {beta: 0.5, alpha: 0.85}
    - {beta: 1, alpha: 0.82}
    - {beta: 2, alpha: 0.85}
    - {beta: 3, alpha: 0.80}

grs3wdc_mc:
  metric: euclidean
  threshold_mode: percentile
  params:
    - {beta: 0.30, alpha: 0.70}
    - {beta: 0.40, alpha: 0.80}
    - {beta: 0.50, alpha: 0.80}
    - {beta: 0.50, alpha: 0.85}

n_runs: 20
test_size: 0.2
seed_base: 42
